name: Weather ETL Pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC — free, no ADF needed
  workflow_dispatch:        # Also allows manual "Run" button in GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest  # Free GitHub-hosted runner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python pipeline.py

      - name: Commit updated data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.db data/silver/ data/bronze/
          git diff --staged --quiet || git commit -m "chore: daily ETL run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push